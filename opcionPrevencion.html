<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="prevention_choice">Prevención - Actividades de Mejora</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="lang.js"></script>
    
    <link rel="stylesheet" href="css/opcionPrevencion.css">
</head>
<body>
    <header role="banner">
        <div class="header-left">
            <!-- Espacio reservado para alineación -->
        </div>
        
        <div class="header-center">
            <div class="app-title" data-i18n="app_title">Desarrollo de Formularios para Actividades de Mejora</div>
            <div class="project-name-container" id="projectNameDisplay">
                <span data-i18n="project">Proyecto:</span> <span id="projectNameText">(Sin nombre)</span>
            </div>
        </div>
        
        <div class="header-right">
            <div class="header-controls">
                <button class="theme-toggle" id="themeToggle" title="Cambiar tema">
                    🌙
                </button>
                <div class="language-selector">
                    <select id="languageSelector">
                        <option value="es">🇪🇸 Español</option>
                        <option value="en">🇺🇸 English</option>
                    </select>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="icon-container">
            <div class="icon">⚠️</div>
        </div>
        
        <h1 data-i18n="prevention_question">Prevención de Riesgos</h1>
        
        <p class="pregunta" data-i18n="ask_prevention">¿Deseas realizar el análisis de prevención de riesgos?</p>
        
        <div class="buttons">
            <button class="btn-si" id="btnSi">
                <span class="btn-icon"></span>
                <span data-i18n="yes_prevention">Sí, realizar prevención</span>
            </button>
            <button class="btn-no" id="btnNo">
                <span class="btn-icon"></span>
                <span data-i18n="no_prevention">No, saltar a diagramas</span>
            </button>
        </div>
        
        <div class="back-button">
            <button class="btn-secondary" onclick="window.location.href='opcionConceptos.html'" data-i18n="back">◀️ Regreso</button>
        </div>
    </div>

    <script src="js/opcionPrevencion.js"></script>
</body>
</html>
