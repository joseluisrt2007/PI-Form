<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="criteria_weights">Criterios - Actividades de Mejora</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/descripcion.css">
</head>
<body>
    <header role="banner">
        <div class="header-left">
            <!-- Espacio reservado para alineación -->
        </div>
        
        <div class="header-center">
            <div class="app-title" data-i18n="app_title">Desarrollo de Formularios para Actividades de Mejora</div>
            <div class="project-name-container" id="projectNameDisplay">
                <span data-i18n="project">Proyecto:</span> <span id="projectNameText">(Sin nombre)</span>
            </div>
        </div>
        
        <div class="header-right">
            <div class="header-controls">
                <button class="theme-toggle" id="themeToggle" title="Cambiar tema">
                    🌙
                </button>
                <div class="language-selector">
                    <select id="languageSelector">
                        <option value="es">🇪🇸 Español</option>
                        <option value="en">🇺🇸 English</option>
                    </select>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <h1 data-i18n="description_data">Criterios y pesos (la suma debe ser 10)</h1>

        <!-- Nombre del proyecto -->
        <div class="section">
            <label for="projectName" data-i18n="project_name">Nombre del proyecto</label>
            <input type="text" id="projectName" data-i18n-placeholder="enter_project_name" placeholder="Ingrese el nombre del proyecto">
        </div>

        <!-- Descripción del proyecto -->
        <div class="section">
            <label for="projectDescription" data-i18n="project_description">Descripción del proyecto</label>
            <textarea 
                id="projectDescription" 
                rows="4" 
                data-i18n-placeholder="enter_project_description" 
                placeholder="Describa el objetivo y detalles del proyecto..."
            ></textarea>
        </div>

        <!-- Menú de selección de módulos -->
        <div class="section">
            <h2 data-i18n="modules_menu_title">Selecciona los módulos a realizar</h2>
            <p class="modules-subtitle" data-i18n="modules_menu_subtitle">Elige qué partes del proceso quieres completar. Solo esas páginas, resultados y secciones del PDF se incluirán.</p>

            <div class="modules-list">
                <label class="module-card module-card-required">
                    <input type="checkbox" id="mod-analisisInicial" checked disabled>
                    <div class="module-card-text">
                        <span class="module-card-title" data-i18n="module_initial_analysis">Análisis Inicial</span>
                        <span class="module-card-desc" data-i18n="module_initial_analysis_desc">Necesidades, ideas y evaluación inicial</span>
                    </div>
                    <span class="module-badge" data-i18n="module_required_badge">Obligatorio</span>
                </label>

                <label class="module-card">
                    <input type="checkbox" id="mod-diagrama">
                    <div class="module-card-text">
                        <span class="module-card-title" data-i18n="diagram_question">Diagrama de Actividades</span>
                        <span class="module-card-desc" data-i18n="ask_diagram">¿Quieres realizar los diagramas de funciones?</span>
                    </div>
                </label>

                <label class="module-card">
                    <input type="checkbox" id="mod-exploracionConceptos">
                    <div class="module-card-text">
                        <span class="module-card-title" data-i18n="concept_question">Exploración y Evaluación de Conceptos</span>
                        <span class="module-card-desc" data-i18n="ask_concept">¿Deseas hacer la exploración y evaluación de conceptos?</span>
                    </div>
                </label>

                <label class="module-card">
                    <input type="checkbox" id="mod-prevencion">
                    <div class="module-card-text">
                        <span class="module-card-title" data-i18n="prevention_question">Prevención de Riesgos</span>
                        <span class="module-card-desc" data-i18n="ask_prevention">¿Deseas realizar el análisis de prevención de riesgos?</span>
                    </div>
                </label>
            </div>
        </div>

        <div class="buttons">
            <button class="btn-primary" id="guardarBtn" data-i18n="save">Guardar</button>
            <button class="btn-primary" id="continuarBtn" data-i18n="continue">Continuar</button>
            <button class="btn-secondary" onclick="window.location.href='index.html'" data-i18n="back">Regreso</button>
        </div>
    </div>

    <script src="lang.js"></script>
    <script src="js/descripcion.js"></script>
</body>
</html>
