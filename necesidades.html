<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="criteria_weights">Criterios - Actividades de Mejora</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/necesidades.css">
</head>
<body>
    <header role="banner">
        <div class="header-left">
            <!-- Espacio reservado para alineación -->
        </div>
        
        <div class="header-center">
            <div class="app-title" data-i18n="app_title">Desarrollo de Formularios para Actividades de Mejora</div>
            <div class="project-name-container" id="projectNameDisplay">
                <span data-i18n="project">Proyecto:</span> <span id="projectNameText">(Sin nombre)</span>
            </div>
        </div>
        
        <div class="header-right">
            <div class="header-controls">
                <button class="theme-toggle" id="themeToggle" title="Cambiar tema">
                    🌙
                </button>
                <div class="language-selector">
                    <select id="languageSelector">
                        <option value="es">🇪🇸 Español</option>
                        <option value="en">🇺🇸 English</option>
                    </select>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <h1 data-i18n="criteria_weights">Criterios y pesos (la suma debe ser 10)</h1>

        <!-- Criterios y pesos -->
        <div class="section">
            <h2 data-i18n="criteria_weights">Criterios y pesos (la suma debe ser 10)</h2>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th data-i18n="criteria">Criterio</th>
                        <th data-i18n="weight">Peso</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td style="padding: 1rem; text-align: center; font-weight: 600;">1</td>
                        <td style="padding: 0;"><input type="text" class="criterio" data-id="1" style="border: none; background: transparent; padding: 1rem; width: 100%;"></td>
                        <td style="padding: 0;"><input type="number" class="peso" data-id="1" min="0" step="0.1" style="border: none; background: transparent; padding: 1rem; width: 100%;"></td>
                    </tr>
                    <tr>
                        <td style="padding: 1rem; text-align: center; font-weight: 600;">2</td>
                        <td style="padding: 0;"><input type="text" class="criterio" data-id="2" style="border: none; background: transparent; padding: 1rem; width: 100%;"></td>
                        <td style="padding: 0;"><input type="number" class="peso" data-id="2" min="0" step="0.1" style="border: none; background: transparent; padding: 1rem; width: 100%;"></td>
                    </tr>
                    <tr>
                        <td style="padding: 1rem; text-align: center; font-weight: 600;">3</td>
                        <td style="padding: 0;"><input type="text" class="criterio" data-id="3" style="border: none; background: transparent; padding: 1rem; width: 100%;"></td>
                        <td style="padding: 0;"><input type="number" class="peso" data-id="3" min="0" step="0.1" style="border: none; background: transparent; padding: 1rem; width: 100%;"></td>
                    </tr>
                    <tr>
                        <td style="padding: 1rem; text-align: center; font-weight: 600;">4</td>
                        <td style="padding: 0;"><input type="text" class="criterio" data-id="4" style="border: none; background: transparent; padding: 1rem; width: 100%;"></td>
                        <td style="padding: 0;"><input type="number" class="peso" data-id="4" min="0" step="0.1" style="border: none; background: transparent; padding: 1rem; width: 100%;"></td>
                    </tr>
                    <tr>
                        <td style="padding: 1rem; text-align: center; font-weight: 600;">5</td>
                        <td style="padding: 0;"><input type="text" class="criterio" data-id="5" style="border: none; background: transparent; padding: 1rem; width: 100%;"></td>
                        <td style="padding: 0;"><input type="number" class="peso" data-id="5" min="0" step="0.1" style="border: none; background: transparent; padding: 1rem; width: 100%;"></td>
                    </tr>
                </tbody>
            </table>
            <div class="error" id="pesoError"></div>
        </div>

        <div class="buttons">
            <button class="btn-primary" id="guardarBtn" data-i18n="save">Guardar</button>
            <button class="btn-primary" id="continuarBtn" data-i18n="continue">Continuar</button>
            <button class="btn-secondary" onclick="window.location.href='descripcion.html'" data-i18n="back">Regreso</button>
        </div>
    </div>

    <script src="lang.js"></script>
    <script src="js/necesidades.js"></script>
</body>
</html>
