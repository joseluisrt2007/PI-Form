<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="diagram">Diagrama - Actividades de Mejora</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="lang.js"></script>
    
    <link rel="stylesheet" href="css/diagrama.css">
</head>
<body>
    <header role="banner">
        <div class="header-left"></div>
        
        <div class="header-center">
            <div class="app-title" data-i18n="app_title">Desarrollo de Formularios para Actividades de Mejora</div>
            <div class="project-name-container" id="projectNameDisplay">
                <span data-i18n="project">Proyecto:</span> <span id="projectNameText">(Sin nombre)</span>
            </div>
        </div>
        
        <div class="header-right">
            <div class="header-controls">
                <button class="theme-toggle" id="themeToggle" title="Cambiar tema">🌙</button>
                <div class="language-selector">
                    <select id="languageSelector">
                        <option value="es">🇪🇸 Español</option>
                        <option value="en">🇺🇸 English</option>
                    </select>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <h1 data-i18n="diagram">Diagrama de funciones</h1>

        <div class="tabla-tareas">
            <h2 data-i18n="tasks_responsibles">Enlace de entradas y salidas a través de funciones</h2>
            
            <div class="table-responsive">
                <table id="tareasTable">
                    <thead>
                        <tr>
                            <th style="width: 5%;">#</th>
                            <th style="width: 22%;" data-i18n="responsable_label">Entrada</th>
                            <th style="width: 5%;"></th>
                            <th style="width: 28%;" data-i18n="task_label">Función</th>
                            <th style="width: 5%;"></th>
                            <th style="width: 25%;" data-i18n="salida_label">Salida</th>
                            <th style="width: 10%;"></th>
                        </tr>
                    </thead>
                    <tbody id="tareasBody">
                        <!-- Filas generadas dinámicamente -->
                    </tbody>
                </table>
            </div>

            <div style="text-align: center; margin-top: 2rem;">
                <button class="btn-secondary" id="agregarTareaBtn" style="background: linear-gradient(135deg, #10b981, #059669);">
                    + Agregar fila
                </button>
            </div>
        </div>

        <div class="buttons">
            <button class="btn-primary" id="guardarBtn" data-i18n="save">Guardar</button>
            <button class="btn-primary" id="continuarBtn" data-i18n="continue">Continuar</button>
            <button class="btn-secondary" onclick="window.location.href='opcionDiagramas.html'" data-i18n="back">Regreso</button>
        </div>
    </div>

    <script src="js/diagrama.js"></script>
</body>
</html>
